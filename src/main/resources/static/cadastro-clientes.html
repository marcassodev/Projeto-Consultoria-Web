<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - +Vida</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cadastro-container">
        <h1>+Vida Consultorias</h1>
        <form id="form-cadastro">
            <label>Nome:<input type="text" name="nome" required></label>
            <label>Email:<input type="text" name="email" required></label>
            <label>Senha:<input type="password" name="senha" required></label>
            <label>Telefone:<input type="text" name="telefone"></label>
            <label>CPF:<input type="text" name="cpf" required></label>
            <label>Nascimento:<input type="date" name="nascimento"></label>
            <button type="submit">Cadastrar</button>
        </form>
        <p id="msg-cadastro"></p>
        <p>Já possui conta? <a href="login.html">Faça login</a></p>
    </div>

    <script src="/js/cadastro_cliente.js"></script>
</body>
</html>
