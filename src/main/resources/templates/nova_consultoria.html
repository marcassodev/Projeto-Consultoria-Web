<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Consultoria</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1 class="logo">
            <img src="img/+vida_logo.PNG">
        </h1>
        <nav>
            <a href="index.html">Página Inicial</a>
            <a href="tabela_consultorias.html">Tabela de Consultorias</a>
            <a href="nova_consultoria.html">Nova Consultoria</a>
            <a href="cadastro_cliente.html">Criação de Conta</a>
        </nav>
    </header>

    <main>
        <h2>Nova Consultoria</h2>

        <form id="form-consultoria" class="form-box">
            
            <label for="paciente">Nome do Paciente:</label>
            <input type="text" id="paciente" name="paciente">

            <label for="tipo">Tipo de Consultoria:</label>
            <input type="text" id="tipo" name="tipo">

            <label for="sala">Número da Sala:</label>
            <input type="text" id="sala" name="sala">

            <label for="medico">Nome do Médico:</label>
            <input type="text" id="medico" name="medico">

            <label for="data">Data:</label>
            <input type="date" id="data" name="data">

            <label for="hora">Hora:</label>
            <input type="time" id="hora" name="hora">

            <button type="submit">Salvar Consultoria</button>
        </form>
    </main>

    <footer>
        <p>© 2025 Melhor Saúde - Todos os direitos reservados.</p>
    </footer>
    <script src="js/nova_consultoria.js"></script>
</body>
</html>
